services:
  # Broker de Kafka real en modo KRaft (sin Zookeeper — es el modo
  # recomendado desde Kafka 3.x, menos piezas móviles para un solo nodo).
  kafka:
    image: apache/kafka:3.7.0
    container_name: konfio-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      # 29092 expuesto al host, útil si quieres inspeccionar el topic desde
      # una herramienta externa (ej. kafkacat) corriendo fuera de Docker.
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
 
  pipeline:
    build: .
    container_name: konfio-exchange-rates-pipeline
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      # Persistimos el catálogo Iceberg y los eventos fuera del contenedor
      # para poder inspeccionarlos después de que el pipeline termina.
      - ./warehouse:/app/warehouse
      - ./events:/app/events
      - ./reports:/app/reports
      # Se monta (no se copia en el Dockerfile) porque el notebook se edita
      # interactivamente — un volumen refleja cambios sin rebuild.
      - ./notebooks:/app/notebooks
    command: ["python", "-m", "src.main"]
 
  # Consumidor de demostración: NO corre con `docker compose up` normal,
  # solo bajo el profile "demo", para poder mostrar que efectivamente se
  # puede leer del topic sin que el consumidor bloquee la ejecución del
  # pipeline principal (un consumer normalmente corre indefinidamente).
  kafka-consumer-demo:
    build: .
    container_name: konfio-kafka-consumer-demo
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: ["python", "-m", "src.consumer_demo"]
    profiles: ["demo"]
 
  # Demo de time travel + schema evolution sobre la tabla ya persistida.
  # No depende de Kafka — solo lee/escribe metadata en el mismo catálogo
  # Iceberg que ya generó el servicio `pipeline`.
  iceberg-demo:
    build: .
    container_name: konfio-iceberg-demo
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./warehouse:/app/warehouse
    command: ["python", "-m", "src.iceberg_demo"]
    profiles: ["demo"]